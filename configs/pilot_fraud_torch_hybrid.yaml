# Same as pilot_fraud_torch.yaml but uses the full delayed_hybrid stack
# (recurrence gate + exchangeability + residual correction + outstanding-feedback control).
# Requires torch tabular adapter (not sklearn).

operating_mode: bounded_auto
model_version: paysim-torch-pilot-hybrid-v1

bounded_auto_actions:
  - none
  - hold
  - bn_refresh
  - recalibrate
  - label_shift
  - reset

policy:
  name: delayed_hybrid
  bandit_alpha: 0.85
  distance_threshold: 0.55
  max_specialists: 4
  allowed_actions:
    - none
    - hold
    - recalibrate
    - label_shift
    - reset

monitor:
  alert_threshold: 1.15
  severe_threshold: 1.65
  risk_alert_threshold: 9.0
  risk_decay: 0.90

safety_budget:
  enabled: true
  window_steps: 32
  max_auto_actions_per_window: 1
  max_resets_per_window: 1
  downgrade_to_recommend: true

kpi:
  accuracy_weight: 0.85
  false_alert_cost: 0.12
  drift_cost: 0.04
  abstention_cost: 0.08
  reset_cost: 0.06
  retrain_recommendation_cost: 0.12

replay:
  batch_size: 64
  label_delay_steps: 4
  max_steps: 48

governance:
  audit_db_path: results/pilot_torch_hybrid/audit.db
  snapshot_dir: results/pilot_torch_hybrid/snapshots
  environment: pilot_torch_hybrid
  persist_snapshots_in_shadow: false
  persist_snapshots_on_recommend: false
  persist_snapshots_on_mutation: true

policy_state_path: null
policy_state_save_path: results/pilot_torch_hybrid/policy_state.json

metrics:
  enabled: true
  prometheus_port: 9093

log_json: false
