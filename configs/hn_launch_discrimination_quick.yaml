# Quick discrimination — PaySim hard slice only (pairs with hn_launch_quick.yaml).

operating_mode: bounded_auto
model_version: hn-discrimination-quick-v1

bounded_auto_actions:
  - none
  - hold
  - recalibrate
  - label_shift
  - reset
  - adapt

policy:
  name: regime_aware_delayed_bandit
  bandit_alpha: 0.85
  scheduled_retrain_interval: 6
  allowed_actions:
    - none
    - hold
    - recalibrate
    - label_shift
    - reset
    - adapt

monitor:
  alert_threshold: 1.15
  severe_threshold: 1.65
  risk_alert_threshold: 9.0
  risk_decay: 0.90

kpi:
  false_alert_cost: 0.06
  retrain_recommendation_cost: 0.08

replay:
  batch_size: 64
  label_delay_steps: 8
  label_delay_jitter_steps: 2
  max_steps: 12

discrimination_benchmark:
  controller_name: regime_aware_delayed_bandit
  min_rankable_metrics: 1
  min_metric_spread: 0.005
  false_positive_cost: 1.0
  false_negative_cost: 10.0
  strategies:
    - frozen
    - scheduled_retrain
    - naive
    - regime_aware_delayed_bandit
    - delayed_hybrid
  sources:
    - id: paysim_fraud_torch_hard
      tier: discrimination
      description: PaySim hard slice (toy)
      steps: 12
      label_delay_steps: 8
