operating_mode: bounded_auto
model_version: fraud-sklearn-pilot-v1

bounded_auto_actions:
  - none
  - hold
  - recalibrate
  - label_shift

policy:
  name: regime_aware_delayed_bandit
  bandit_alpha: 0.85
  allowed_actions:
    - none
    - recalibrate
    - label_shift
    - reset

monitor:
  alert_threshold: 1.10
  severe_threshold: 1.60
  risk_alert_threshold: 8.5
  risk_decay: 0.92

safety_budget:
  enabled: true
  window_steps: 24
  max_auto_actions_per_window: 2
  max_resets_per_window: 0
  downgrade_to_recommend: true

kpi:
  accuracy_weight: 0.85
  false_alert_cost: 0.12
  drift_cost: 0.04
  abstention_cost: 0.08
  reset_cost: 0.05
  retrain_recommendation_cost: 0.12

replay:
  batch_size: 64
  label_delay_steps: 4
  max_steps: 48

governance:
  audit_db_path: results/pilot_sklearn/audit.db
  snapshot_dir: results/pilot_sklearn/snapshots
  environment: pilot_sklearn
  persist_snapshots_in_shadow: false
  persist_snapshots_on_recommend: false
  persist_snapshots_on_mutation: true

policy_state_save_path: results/pilot_sklearn/policy_state.json

metrics:
  enabled: false

log_json: false
