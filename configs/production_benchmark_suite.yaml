# Production-grade evidence suite — sklearn path with strong baselines + temporal split.

operating_mode: bounded_auto
model_version: production-benchmark-v1

bounded_auto_actions:
  - none
  - hold
  - recalibrate
  - label_shift
  - reset
  - adapt

policy:
  name: regime_aware_delayed_bandit
  bandit_alpha: 0.85
  scheduled_retrain_interval: 6
  allowed_actions:
    - none
    - hold
    - recalibrate
    - label_shift
    - reset
    - adapt

monitor:
  alert_threshold: 1.15
  severe_threshold: 1.65
  risk_alert_threshold: 9.0
  risk_decay: 0.90

safety_budget:
  enabled: true
  window_steps: 48
  max_auto_actions_per_window: 2
  max_resets_per_window: 1
  downgrade_to_recommend: true

kpi:
  accuracy_weight: 0.85
  false_alert_cost: 0.12
  drift_cost: 0.04
  abstention_cost: 0.08
  reset_cost: 0.06
  retrain_recommendation_cost: 0.12

replay:
  batch_size: 128
  label_delay_steps: 12
  label_delay_jitter_steps: 4
  max_steps: 120

governance:
  audit_db_path: results/production_benchmark/audit.db
  snapshot_dir: results/production_benchmark/snapshots
  environment: production_benchmark
  persist_snapshots_in_shadow: false
  persist_snapshots_on_recommend: false
  persist_snapshots_on_mutation: true

policy_state_save_path: null

metrics:
  enabled: false

log_json: false

production_benchmark:
  controller_name: regime_aware_delayed_bandit
  strategies:
    - frozen
    - regime_aware_delayed_bandit
  baseline_strategies:
    - scheduled_retrain
    - naive
  require_beat_baselines: false
  min_core_sources_passing: 2
  evidence:
    min_utility_delta: 0.005
    min_risk_reduction_pct: 5.0
    min_stream_records: 20000
    min_adaptation_safety_rate: 0.85
    stretch_utility_delta: 0.01
    stretch_risk_reduction_pct: 10.0

sources:
  - id: ulb_creditcard_fraud
    tier: core
    description: ULB credit card fraud — temporal train split, natural drift
    steps: 120
    batch_size: 128
    stream_cycles: 6
    label_delay_steps: 12
    label_delay_jitter_steps: 4
    apply_synthetic_shift: false
    temporal_split: true

  - id: ieee_cis_fraud
    tier: core
    description: IEEE-CIS fraud Kaggle full — temporal train split
    steps: 120
    batch_size: 128
    stream_cycles: 8
    label_delay_steps: 12
    label_delay_jitter_steps: 4
    apply_synthetic_shift: false
    temporal_split: true

  - id: paysim_fraud
    tier: core
    description: PaySim synthetic fraud with regime stress
    steps: 96
    batch_size: 128
    stream_cycles: 8
    label_delay_steps: 8
    label_delay_jitter_steps: 3
    apply_synthetic_shift: true
    temporal_split: true

  - id: openml_credit_g
    tier: auxiliary
    description: OpenML German Credit — risk-adjacent sanity check
    steps: 72
    batch_size: 64
    stream_cycles: 6
    label_delay_steps: 6
    apply_synthetic_shift: true
    temporal_split: true
